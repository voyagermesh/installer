{{- if eq .Values.monitoring.agent "prometheus.io/operator" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gateway-converter.fullname" . }}-metrics-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gateway-converter.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: {{ include "gateway-converter.serviceAccountName" . }}
type: kubernetes.io/service-account-token
{{- end }}
